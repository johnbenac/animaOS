name: anima-mod Tests

on:
  push:
    paths:
      - 'apps/anima-mod/**'
  pull_request:
    paths:
      - 'apps/anima-mod/**'

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      
      - name: Install dependencies
        working-directory: apps/anima-mod
        run: bun install
      
      - name: Type check
        working-directory: apps/anima-mod
        run: bunx tsc --noEmit
      
      - name: Run tests
        working-directory: apps/anima-mod
        run: bun test
