[tool.uv.workspace]
members = ["apps/server"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = [
  "E",    # pycodestyle errors
  "W",    # pycodestyle warnings
  "F",    # pyflakes
  "I",    # isort
  "UP",   # pyupgrade
  "B",    # flake8-bugbear
  "SIM",  # flake8-simplify
  "RUF",  # ruff-specific rules
]
ignore = [
  "E501",   # line length handled by formatter
  "B008",   # Depends() in FastAPI route defaults is idiomatic
  "E402",   # lazy/conditional imports are intentional
]

[tool.ruff.format]
quote-style = "double"

[tool.pytest.ini_options]
testpaths = ["apps/server/tests"]
